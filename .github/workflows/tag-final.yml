name: Create BYReady Tag

on:
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Validate Feature Branch
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"

          if [[ ! "$BRANCH_NAME" =~ ^feature/ ]]; then
            echo "This workflow can only run from feature branches."
            exit 1
          fi

      - name: Create BYReady Tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git fetch --tags

          BRANCH_NAME="${GITHUB_REF_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          EXISTING_COUNT=$(git tag -l "${BRANCH_NAME}-BYReady*" | wc -l)

          if [ "$EXISTING_COUNT" -eq 0 ]; then
            TAG_NAME="${BRANCH_NAME}-BYReady"
          else
            TAG_NAME="${BRANCH_NAME}-BYReady${EXISTING_COUNT}"
          fi

          echo "Creating tag: $TAG_NAME"

          git tag "${TAG_NAME}"

          git push \
            https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }} \
            "${TAG_NAME}"

      

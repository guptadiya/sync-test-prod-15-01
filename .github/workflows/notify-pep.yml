name: Notify Pepsico Repo

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
# needed from BY
    steps:

      - name: Generate GitHub App token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CUSTOMER_APP_ID }}
          private-key: ${{ secrets.CUSTOMER_APP_PRIVATE_KEY }}
          owner: GitHubActionsPOC
          repositories: gh-blue-yonder-testing-prod-15-01

      - name: Trigger customer workflow
        env:
          TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/GitHubActionsPOC/gh-blue-yonder-testing-prod-15-01/dispatches \
            -d '{"event_type":"BY-main-updated"}'
